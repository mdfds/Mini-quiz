<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Квіз 1</title>
</head>
<body style="font-family: Arial; text-align:center;">

<h1>🌹 Вгадай квітку</h1>

<p>Яка це квітка — символ кохання?</p>

<button onclick="check('a')">Тюльпан</button>
<button onclick="check('b')">Троянда</button>
<button onclick="check('c')">Ромашка</button>

<p id="result"></p>

<a href="index.html">⬅ Назад</a>

<script>
function check(answer) {
    if(answer === 'b') {
        document.getElementById("result").innerText = "Правильно! 🌹";
    } else {
        document.getElementById("result").innerText = "Неправильно 😢";
    }
}
</script>

</body>
</html>
